					replaceTextInDOM("This does not appear to be a valid date", "Đây dường như không phải là một ngày hợp lệ");
					replaceTextInDOM("Please enter a valid phone number", "Vui lòng nhập số điện thoại hợp lệ");
					replaceTextInDOM("This date must be between", "Ngày này phải nằm trong khoảng từ");
				} else if (getLang.startsWith("ar")) {
					replaceTextInDOM("This field is required", "الإجابة على هذا السؤال اجباري");
					replaceTextInDOM("This does not appear to be a valid email address", "لا يبدو أن هذا عنوان بريد إلكتروني صالح");
					replaceTextInDOM("Please enter a valid 5-digit ZIP code", "يُرجى إدخال رمز بريدي صالح مكون من 5 أرقام");
					replaceTextInDOM("This does not appear to be a valid date", "لا يبدو أن هذا تاريخ صالح");
					replaceTextInDOM("Please enter a valid phone number", "يُرجى إدخال رقم هاتف صالح");
					replaceTextInDOM("This date must be between", "يجب أن يكون هذا التاريخ بين");
				} else if (getLang.startsWith("so")) {
					replaceTextInDOM("This field is required", "Jawaabta su’aashan waa qasab");
					replaceTextInDOM("This does not appear to be a valid email address", "Tani uma muuqato inay tahay cinwaan email oo sax ah");
					replaceTextInDOM("Please enter a valid 5-digit ZIP code", "Fadlan geli koodh ZIP oo sax ah oo 5-lambar ah");
					replaceTextInDOM("This does not appear to be a valid date", "Tani uma muuqato inay tahay taariikh sax ah");
					replaceTextInDOM("Please enter a valid phone number", "Fadlan geli lambarka telefoonka ee saxda ah");
					replaceTextInDOM("This date must be between", "Taariikhdan waa inay u dhaxeysaa");
				}

			})

			const waitTextMap = {
		    en: "Please wait...",
		    es: "Por favor espera...",
		    ru: "Пожалуйста, подождите...",
		    vi: "Vui lòng đợi...",
		    zh: "请稍候...",
		    ar: "يرجى الانتظار...",
		    so: "Fadlan sug..."
			};

			const btn = document.querySelector("#submit_button");

			if (btn) {
		    console.log("Observing submit button for value changes");

		    const observer = new MutationObserver((mutations) => {
	        mutations.forEach((mutation) => {
            if (mutation.type === "attributes" && mutation.attributeName === "value") {

              const currentVal = btn.value || "";
              console.log("Button value changed to:", currentVal);

              if (currentVal.toLowerCase().includes("please wait")) {
						    const translated = waitTextMap[getLang] || waitTextMap['en'];

						    let attempts = 0;
						    const interval = setInterval(() => {
					        btn.value = translated;
					        attempts++;

					        if (attempts > 5) clearInterval(interval);
						    }, 50);
							}
            }
	        });
		    });

		    observer.observe(btn, {
	        attributes: true,
	        attributeFilter: ["value"]
		    });
			}



	});
</script>
