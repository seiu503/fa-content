	  name = name.replace(/[[\]]/g, "\\$&");
	  const regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
	  const results = regex.exec(url);
	  if (!results) return null;
	  if (!results[2]) return "";
	  return decodeURIComponent(results[2].replace(/\+/g, " "));

let currentGetLang = () => "en";

function getCurrentLang() {
  const candidates = [
    typeof currentGetLang === "function" ? currentGetLang() : currentGetLang,
    document.documentElement.lang,
    document.body?.lang,
    document.body?.dataset?.lang,
    new URLSearchParams(window.location.search).get("lang"),
    new URLSearchParams(window.location.search).get("language"),
    document.querySelector("[lang]")?.getAttribute("lang"),
    document.querySelector("html")?.getAttribute("lang")
  ];

  const found = candidates
    .map(value => String(value || "").trim().toLowerCase())
    .find(value => value && value !== "en");

  return (found || "en").split("-")[0];
}


function patchAlert() {
  if (window.__faLocalizedAlertPatched) return;
  window.__faLocalizedAlertPatched = true;

  const originalAlert = window.alert;

  window.alert = function (message) {
    const lang = getCurrentLang();
    const dict = i18n[lang];

    console.log("FA alert intercepted:", message, "lang:", lang);

    if (dict && typeof message === "string") {
      const match = message.match(
        /The form is not complete and has not been submitted yet\. There (?:is|are) (\d+) problems? with your submission\./i
      );

      if (match) {
        return originalAlert.call(window, dict.alert(Number(match[1])));
      }
    }

    return originalAlert.call(window, message);
  };
}

function observeFormAssemblyErrors() {
  if (window.__faErrorObserverInstalled) return;
  window.__faErrorObserverInstalled = true;

  new MutationObserver(runTranslations).observe(document.documentElement, {
    childList: true,
    subtree: true,
    characterData: true,
    attributes: true,
    attributeFilter: ["value", "class", "style"]
  });

  document.addEventListener(
    "submit",
    () => {
      setTimeout(runTranslations, 0);
      setTimeout(runTranslations, 50);
      setTimeout(runTranslations, 250);
      setTimeout(runTranslations, 1000);
    },
    true
  );

  document.addEventListener(
    "click",
    () => {
      setTimeout(runTranslations, 0);
      setTimeout(runTranslations, 50);
      setTimeout(runTranslations, 250);
    },
    true
  );
}

function observeSubmitButton() {
  // This can be global because buttons may not exist yet
  document.addEventListener(
    "submit",
    () => {
      setTimeout(translateSubmitButtons, 0);
      setTimeout(translateSubmitButtons, 50);
      setTimeout(translateSubmitButtons, 250);
      setTimeout(translateSubmitButtons, 1000);
    },
    true
  );
}

function runTranslations() {
  console.log("running translations", getCurrentLang());
  translateValidationMessages();
  translateSubmitButtons();
}

function translateSubmitButtons() {
  const lang = getCurrentLang();
  const dict = i18n[lang];
  if (!dict) return;

  document
    .querySelectorAll("input[type='submit'], button[type='submit']")
    .forEach(btn => {
      if (btn.tagName === "INPUT" && /please wait/i.test(btn.value)) {
        btn.value = dict.pleaseWait;
      } else if (/please wait/i.test(btn.textContent)) {
        btn.textContent = dict.pleaseWait;
      }
    });
}

function initValidation({ formEl, getLang }) {
  console.log("initValidation called");

  if (typeof getLang === "function") {
    currentGetLang = getLang;
  } else if (typeof getLang === "string") {
    currentGetLang = () => getLang;
  }

  runTranslations();
}

initValidation({
  formEl,
  getLang,
  translations
});

function translateValidationMessages() {
  const lang = getCurrentLang();
  if (lang === "en") return;

  const dict = i18n[lang];
  if (!dict) return;

  document.querySelectorAll(".errMsg").forEach(el => {
    let text = el.textContent || "";

    Object.entries(dict.messages).forEach(([english, translated]) => {
      text = text.replaceAll(english, translated);
    });

    if (el.textContent !== text) {
      console.log("Translated error:", el.textContent, "=>", text);
      el.textContent = text;
    }
  });
}

<script type="text/javascript"> 

  window.addEventListener("load", function() {

    const mmEl = document.getElementById("tfa_129");
    const ddEl = document.getElementById("tfa_133");
    const yyyyEl = document.getElementById("tfa_131");
    const dobEl = document.getElementById("tfa_113");

    var mmSelect = document.getElementById("tfa_156");
    var ddSelect = document.getElementById("tfa_157");
    var yyyySelect = document.getElementById("tfa_158");

    const dateSelects = [mmSelect, ddSelect, yyyySelect];

    // switch helper for dateOptions
    const getMaxDay = month => {
      switch (month) {
        case "02":
          return 29;
        case "04":
        case "06":
        case "09":
        case "11":
          return 30;
        default:
          return 31;
      }
    };

    // function to adjust date select based on mm value
    const dateOptions = () => {
      const selectVal = el => el.options[el.selectedIndex].text;
      const mm = selectVal(mmSelect);
      const max = getMaxDay(mm);
      let dates = [];
      for (let i = 1; i <= max; i++) {
        if (i < 10) {
          dates.push("0" + i);
        } else {
          dates.push(i.toString());
        }
      }
      dates.unshift("");
      return dates;
    };

    // dynamically fills yyyy select with last 100 years
    const yearOptions = () => {
      let years = [];
      for (
        let i = new Date().getFullYear() - 99;
        i <= new Date().getFullYear();
        i++
      ) {
        years.unshift(i.toString());
      }
      years.unshift("");
      return years;
    };

    function emptyCombo(selectEl) {
      selectEl.options.length = 1;
      return selectEl;
    }

    function appendChildren(el, children) {
      return el.append(...children);
    }

    function populateCombo(selectEl, items) {
      return appendChildren(selectEl, items.map(item => new Option(item, item)));
    }

    mmSelect.addEventListener("change", function () {
		  const previousDay = ddSelect.value;

		  populateCombo(emptyCombo(ddSelect), dateOptions());

		  if (
		    previousDay &&
		    Array.from(ddSelect.options).some(option => option.value === previousDay)
		  ) {
		    ddSelect.value = previousDay;
		  }
		});

    populateCombo(emptyCombo(yyyySelect), yearOptions());

    const getSelectedText = el => el.options[el.selectedIndex].textContent.trim();

    // date formatter for submitting to Salesforce
    const formatSFDate = date => {
    	console.log(`date: ${date}`);
      let d = new Date(date),
        month = "" + (d.getMonth() + 1),
        day = "" + d.getDate(),
        year = d.getFullYear();

      if (month.length < 2) month = "0" + month;
      if (day.length < 2) day = "0" + day;
      console.log(`d: ${d}`);
      return [year, month, day].join("-");
    };


    // convert MM DD YYYY to SF-formatted birthdate
    const formatBirthdate = (mm, dd, yyyy) => {
      console.log("formatBirthdate");
      console.log(mm, dd, yyyy);
      const dobRaw = `${mm}/${dd}/${yyyy}`;
      console.log(`dobRaw: ${dobRaw}`);
      return formatSFDate(dobRaw);
    };

    dateSelects.forEach(field => field.addEventListener("change", function () {
		  const mm = getSelectedText(mmSelect);
		  const dd = getSelectedText(ddSelect);
		  const yyyy = getSelectedText(yyyySelect);

		  if (
		    !mm || !dd || !yyyy ||
		    mm === "Month" || mm === "Mes" || mm === "Месяц" ||
		    dd === "Day" || dd === "Día" || dd === "День" ||
		    yyyy === "Year" || yyyy === "Año" || yyyy === "Год"
		  ) {
		    dobEl.value = "";
		    return;
		  }

		  dobEl.value = formatBirthdate(mm, dd, yyyy);
		}));

  });

</script>
