<script>
  // PREFILL MODAL	
  // when page loads,
  document.addEventListener("DOMContentLoaded", function(){

  	var fullName = document.getElementById('tfa_330').value.substring(0,40);

  	// Extract the value of the language the browser is set to:
		const getLang = navigator.language;
		console.log("getLang = ", getLang);
		const spanish = getLang.startsWith("es");

		// append hidden button to DOM
		var hiddenButton = document.createElement('button');
    hiddenButton.setAttribute("id", "hiddenButton");
		hiddenButton.setAttribute("data-modal-prefix-class", "simple-animated");
		hiddenButton.setAttribute("data-modal-content-id", "tfa_327"); // FA fieldset containing the modal elements
		hiddenButton.setAttribute("data-modal-title", `${spanish ? '¿Es Ud.' : 'Are you'} ${fullName}?`);
		hiddenButton.setAttribute("data-modal-close-text", `${spanish ? 'Sí, soy' : "Yes, I'm"} ${fullName}`);
		hiddenButton.setAttribute("data-modal-close-title", `${spanish ? 'Sí, soy' : "Yes, I'm"} ${fullName}`);
		hiddenButton.setAttribute("class", "js-modal invisible");
		document.body.insertBefore(hiddenButton, document.body.firstChild);

  	// check if CA ID is prepopulated from query params
  	var urlParams = new URLSearchParams(window.location.search);
		var CA_ID = urlParams.get('tfa_326');

  	// check if FA found a single SF CA
  	// and was able to populate the fullName field
  	// if CA ID and fullName both exist, simulate a click on the
  	// hidden button to trigger the modal opening
  	if (CA_ID && fullName) {
  		document.getElementById("hiddenButton").click();
  	}

  	// append link to linkInfo display div
  	const linkInfo = document.getElementById('tfa_331');
  	const linkHtml = `<button type="reset" class="custom-link-text js-modal-close">${spanish ? 'No soy' : "I'm not"} ${fullName}</button>`;

  	linkInfo.addEventListener('click', function() {
  		window.location.href = window.location.origin + window.location.pathname; // strip query params
  	})

  	linkInfo.innerHTML += linkHtml;

  });

</script>

<script type="text/javascript"> 

  window.addEventListener("load", function() {

    const mmEl = document.getElementById("tfa_129");
    const ddEl = document.getElementById("tfa_133");
    const yyyyEl = document.getElementById("tfa_131");
    const dobEl = document.getElementById("tfa_113");

    var mmSelect = document.getElementById("tfa_156");
    var ddSelect = document.getElementById("tfa_157");
    var yyyySelect = document.getElementById("tfa_158");

    const dateSelects = [mmSelect, ddSelect, yyyySelect];

    // switch helper for dateOptions
    const getMaxDay = month => {
      switch (month) {
        case "02":
          return 29;
        case "04":
        case "06":
        case "09":
        case "11":
          return 30;
        default:
          return 31;
      }
    };

    // function to adjust date select based on mm value
    const dateOptions = () => {
      const selectVal = el => el.options[el.selectedIndex].text;
      const mm = selectVal(mmSelect);
      const max = getMaxDay(mm);
      let dates = [];
      for (let i = 1; i <= max; i++) {
        if (i < 10) {
          dates.push("0" + i);
        } else {
          dates.push(i.toString());
        }
      }
      dates.unshift("");
      return dates;
    };

    // dynamically fills yyyy select with last 100 years
    const yearOptions = () => {
      let years = [];
      for (
        let i = new Date().getFullYear() - 99;
        i <= new Date().getFullYear();
        i++
      ) {
        years.unshift(i.toString());
      }
      years.unshift("");
      return years;
    };

    function emptyCombo(selectEl) {
      selectEl.options.length = 1;
      return selectEl;
    }

    function appendChildren(el, children) {
      return el.append(...children);
    }

    function populateCombo(selectEl, items) {
      return appendChildren(selectEl, items.map(item => new Option(item, item)));
    }

    mmSelect.addEventListener('change', function() {
      populateCombo(emptyCombo(ddSelect), dateOptions());
    })

    populateCombo(emptyCombo(yyyySelect), yearOptions());

    

    // date formatter for submitting to Salesforce
    const formatSFDate = date => {
      let d = new Date(date),
        month = "" + (d.getMonth() + 1),
        day = "" + d.getDate(),
        year = d.getFullYear();

      if (month.length < 2) month = "0" + month;
      if (day.length < 2) day = "0" + day;

      return [year, month, day].join("-");
    };


    // convert MM DD YYYY to SF-formatted birthdate
    const formatBirthdate = (mm, dd, yyyy) => {
      console.log("formatBirthdate");
      console.log(mm, dd, yyyy);
      const dobRaw = `${mm}/${dd}/${yyyy}`;
      console.log(dobRaw);
      return formatSFDate(dobRaw);
    };

    dateSelects.forEach(field => field.addEventListener('change', function() {
      console.log('updating birthdate field from selects');
      const selectVal = el => el.options[el.selectedIndex].text;
      dobEl.value = formatBirthdate(selectVal(mmSelect), selectVal(ddSelect), selectVal(yyyySelect));
    }));

  });

</script>
